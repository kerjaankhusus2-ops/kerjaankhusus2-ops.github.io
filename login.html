<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BGNR.ID | Client Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            background-color: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-card {
            background: #ffffff;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border-top: 5px solid #c5a059;
        }
        .login-card img { height: 60px; margin-bottom: 30px; }
        .login-card h2 { letter-spacing: 4px; text-transform: uppercase; margin-bottom: 25px; font-size: 1.2rem; }
        .login-form { display: flex; flex-direction: column; gap: 20px; text-align: left; }
        .login-form label { font-size: 11px; font-weight: bold; text-transform: uppercase; color: #777; margin-bottom: 5px; display: block; }
        .login-form input { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 10px; outline: none; }
        .login-form input:focus { border-color: #c5a059; }
        .btn-login { background-color: #e62129; color: #fff; border: none; padding: 15px; border-radius: 50px; font-weight: bold; text-transform: uppercase; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-login:hover { background-color: #c51a20; }
        .extra-links { margin-top: 25px; font-size: 13px; }
        .extra-links a { text-decoration: none; color: #c5a059; font-weight: 600; }
        .back-home { margin-top: 20px; display: inline-block; font-size: 11px; text-decoration: none; color: #bbb; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="logo-bgnr.png" alt="BGNR.ID Logo">
        <h2>Client Portal</h2>
        
        <form class="login-form">
            <div>
                <label>Email Address</label>
                <input type="email" placeholder="Masukkan email anda" required>
            </div>
            <div>
                <label>Password</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            <button type="button" onclick="window.location.href='dashboard.html'" class="btn-login">Masuk ke Akun</button>
        </form>
        
        <div class="extra-links">
            <p>Belum punya akun? <a href="register.html">Daftar Sekarang</a></p>
            <p style="margin-top: 10px;"><a href="#">Lupa Password?</a></p>
        </div>

        <a href="index.html" class="back-home">← Kembali ke Beranda</a>
    </div>

</body>
</html>
